<svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-return" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Evolutionary Security Framework — Ten Phases</text>

  <!-- Phase boxes -->
  <g transform="translate(20, 60)">
    <!-- Row 1: Phases 1-5 -->
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="80" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d28d9">Phase 1</text>
    <text x="80" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Name</text>
    <text x="80" y="58" text-anchor="middle" font-size="10" fill="#64748b">Chaos → Categories</text>

    <line x1="164" y1="35" x2="186" y2="35" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="190" y="0" width="160" height="70" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="270" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d28d9">Phase 2</text>
    <text x="270" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Relate</text>
    <text x="270" y="58" text-anchor="middle" font-size="10" fill="#64748b">Categories → Structure</text>

    <line x1="354" y1="35" x2="376" y2="35" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="380" y="0" width="160" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="460" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Phase 3</text>
    <text x="460" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Guess</text>
    <text x="460" y="58" text-anchor="middle" font-size="10" fill="#64748b">Structure → Intuition</text>

    <line x1="544" y1="35" x2="566" y2="35" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="570" y="0" width="160" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="650" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Phase 4</text>
    <text x="650" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Measure</text>
    <text x="650" y="58" text-anchor="middle" font-size="10" fill="#64748b">Intuition → Evidence</text>

    <line x1="734" y1="35" x2="756" y2="35" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="760" y="0" width="160" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="840" y="25" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Phase 5</text>
    <text x="840" y="42" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Model</text>
    <text x="840" y="58" text-anchor="middle" font-size="10" fill="#64748b">Evidence → Prediction</text>

    <!-- Row 2: Phases 6-10 -->
    <line x1="840" y1="74" x2="840" y2="96" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="760" y="100" width="160" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="840" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Phase 6</text>
    <text x="840" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Explain</text>
    <text x="840" y="158" text-anchor="middle" font-size="10" fill="#64748b">Prediction → Understanding</text>

    <line x1="756" y1="135" x2="734" y2="135" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="570" y="100" width="160" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <text x="650" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Phase 7</text>
    <text x="650" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Formalize</text>
    <text x="650" y="158" text-anchor="middle" font-size="10" fill="#64748b">Understanding → Rules</text>

    <line x1="566" y1="135" x2="544" y2="135" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="380" y="100" width="160" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="460" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Phase 8</text>
    <text x="460" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Constrain</text>
    <text x="460" y="158" text-anchor="middle" font-size="10" fill="#64748b">Rules → Architecture</text>

    <line x1="376" y1="135" x2="354" y2="135" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="190" y="100" width="160" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="270" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Phase 9</text>
    <text x="270" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Prove</text>
    <text x="270" y="158" text-anchor="middle" font-size="10" fill="#64748b">Architecture → Certainty</text>

    <line x1="186" y1="135" x2="164" y2="135" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="100" width="160" height="70" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
    <text x="80" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#be185d">Phase 10</text>
    <text x="80" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Evolve</text>
    <text x="80" y="158" text-anchor="middle" font-size="10" fill="#64748b">Certainty → New Questions</text>

    <!-- Evolution feedback arrow -->
    <path d="M 80 174 L 80 210 L 480 210 L 480 240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-return)"/>
    <text x="280" y="205" text-anchor="middle" font-size="10" fill="#94a3b8">Evolution cycle feeds back to Phase 1 at higher baseline</text>

    <!-- Labels -->
    <text x="80" y="250" text-anchor="middle" font-size="10" fill="#94a3b8">Low Determinism</text>
    <text x="460" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#6366f1">← Uncertainty converts to Structure →</text>
    <text x="840" y="250" text-anchor="middle" font-size="10" fill="#94a3b8">High Determinism</text>
  </g>
</svg>
