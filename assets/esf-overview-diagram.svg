<svg viewBox="0 0 960 310" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#000">Evolutionary Security Framework — Ten Phases</text>

  <!-- Phase boxes -->
  <g transform="translate(20, 50)">
    <!-- Row 1: Phases 1-5 -->
    <rect x="0" y="0" width="160" height="70" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="80" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 1</text>
    <text x="80" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Name</text>
    <text x="80" y="56" text-anchor="middle" font-size="9" fill="#666">Chaos → Categories</text>

    <line x1="164" y1="35" x2="186" y2="35" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="190" y="0" width="160" height="70" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="270" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 2</text>
    <text x="270" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Relate</text>
    <text x="270" y="56" text-anchor="middle" font-size="9" fill="#666">Categories → Structure</text>

    <line x1="354" y1="35" x2="376" y2="35" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="380" y="0" width="160" height="70" fill="#f5f5f5" stroke="#000" stroke-width="1.5"/>
    <text x="460" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 3</text>
    <text x="460" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Guess</text>
    <text x="460" y="56" text-anchor="middle" font-size="9" fill="#666">Structure → Intuition</text>

    <line x1="544" y1="35" x2="566" y2="35" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="570" y="0" width="160" height="70" fill="#f5f5f5" stroke="#000" stroke-width="1.5"/>
    <text x="650" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 4</text>
    <text x="650" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Measure</text>
    <text x="650" y="56" text-anchor="middle" font-size="9" fill="#666">Intuition → Evidence</text>

    <line x1="734" y1="35" x2="756" y2="35" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="760" y="0" width="160" height="70" fill="#f5f5f5" stroke="#000" stroke-width="1.5"/>
    <text x="840" y="22" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 5</text>
    <text x="840" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Model</text>
    <text x="840" y="56" text-anchor="middle" font-size="9" fill="#666">Evidence → Prediction</text>

    <!-- Row 2: Phases 6-10 -->
    <line x1="840" y1="74" x2="840" y2="96" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="760" y="100" width="160" height="70" fill="#e5e5e5" stroke="#000" stroke-width="1.5"/>
    <text x="840" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 6</text>
    <text x="840" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Explain</text>
    <text x="840" y="156" text-anchor="middle" font-size="9" fill="#666">Prediction → Understanding</text>

    <line x1="756" y1="135" x2="734" y2="135" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="570" y="100" width="160" height="70" fill="#e5e5e5" stroke="#000" stroke-width="1.5"/>
    <text x="650" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Phase 7</text>
    <text x="650" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Formalize</text>
    <text x="650" y="156" text-anchor="middle" font-size="9" fill="#666">Understanding → Rules</text>

    <line x1="566" y1="135" x2="544" y2="135" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="380" y="100" width="160" height="70" fill="#d4d4d4" stroke="#000" stroke-width="1.5"/>
    <text x="460" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#444">Phase 8</text>
    <text x="460" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Constrain</text>
    <text x="460" y="156" text-anchor="middle" font-size="9" fill="#444">Rules → Architecture</text>

    <line x1="376" y1="135" x2="354" y2="135" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="190" y="100" width="160" height="70" fill="#d4d4d4" stroke="#000" stroke-width="1.5"/>
    <text x="270" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#444">Phase 9</text>
    <text x="270" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">Prove</text>
    <text x="270" y="156" text-anchor="middle" font-size="9" fill="#444">Architecture → Certainty</text>

    <line x1="186" y1="135" x2="164" y2="135" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="100" width="160" height="70" fill="#000" stroke="#000" stroke-width="1.5"/>
    <text x="80" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#999">Phase 10</text>
    <text x="80" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Evolve</text>
    <text x="80" y="156" text-anchor="middle" font-size="9" fill="#999">Certainty → New Questions</text>

    <!-- Evolution feedback arrow -->
    <path d="M 80 174 L 80 210 L 480 210 L 480 240" stroke="#999" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-gray)"/>
    <text x="280" y="205" text-anchor="middle" font-size="10" fill="#999">Evolution cycle feeds back to Phase 1 at higher baseline</text>

    <!-- Labels -->
    <text x="80" y="255" text-anchor="middle" font-size="10" fill="#999">Low Determinism</text>
    <text x="460" y="255" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">← Uncertainty converts to Structure →</text>
    <text x="840" y="255" text-anchor="middle" font-size="10" fill="#999">High Determinism</text>
  </g>
</svg>
